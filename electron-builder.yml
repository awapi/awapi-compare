appId: com.awapi.compare
productName: AwapiCompare
copyright: Copyright © 2026 Awapi

directories:
  buildResources: ../../resources
  output: ../../release

files:
  - "out/**"
  - "!**/*.map"
  - "!**/*.test.*"
  - "!**/tsconfig*.json"
  - "!**/{.eslintrc,.prettierrc,.editorconfig}*"

# Signing is intentionally disabled for v1. Reintroduce when certificates
# are provisioned. See docs/release-process.md.
forceCodeSigning: false

mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null

win:
  target:
    - target: nsis
    - target: msi

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: ${productName}-${version}-${arch}-setup.${ext}
  include: ../../resources/installer.nsh

msi:
  oneClick: false
  perMachine: false
  runAfterFinish: true
  artifactName: ${productName}-${version}-${arch}.${ext}

linux:
  category: Development
  maintainer: Awapi <support@awapi.com>
  # electron-builder derives the executable/icon/desktop-entry name from
  # the npm package name when `executableName` is omitted. Our package is
  # `@awapi/desktop`, which gets mangled to `@awapidesktop`. The `@` sign
  # is illegal in FreeDesktop / XDG icon names, so the OS icon theme
  # lookup silently fails and the app shows no icon in the start menu /
  # taskbar. Setting an explicit name avoids the mangling entirely.
  executableName: awapicompare
  # The source icon.png is 1024×1024. Linux XDG icon themes only look for
  # icons at standard hicolor sizes (up to 512×512); a 1024×1024 entry is
  # silently ignored, so no icon appears in the launcher / taskbar.
  # Pointing explicitly to the 512×512 variant ensures it lands in
  # hicolor/512x512/apps/ which every major DE recognises.
  icon: ../../resources/icon-512x512.png
  artifactName: ${productName}-${version}-${arch}.${ext}
  target:
    - target: AppImage
      arch: [x64, arm64]
    - target: deb
      arch: [x64, arm64]

publish:
  provider: github
  owner: awapi
  repo: awapi-compare
  releaseType: draft
  # For a private repo, the running app needs a GH_TOKEN; it is embedded
  # during packaging via env var, NOT committed. See docs/release-process.md.
  private: true

asarUnpack:
  - "**/*.node"
