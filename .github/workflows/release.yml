name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Package & Publish (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.1

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Regenerate third-party notices
        run: pnpm exec tsx scripts/generate-notices.ts

      - name: Package & publish to GitHub Releases
        env:
          # Scope to the awapi/awapi-compare releases only; rotate per
          # docs/release-process.md.
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          # Signing secrets — empty in v1.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm --filter @awapi/desktop exec electron-builder --publish always
