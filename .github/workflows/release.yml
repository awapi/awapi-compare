name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Package & Publish (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.1

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Regenerate third-party notices
        run: pnpm exec tsx scripts/generate-notices.ts

      - name: Package & publish to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # v1 is intentionally unsigned. Disable electron-builder's
          # automatic certificate discovery so the build doesn't try to
          # sign with whatever identity may live on the runner. When
          # signing certificates are provisioned, remove this line and
          # populate the CSC_* / APPLE_* secrets below.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          # Signing secret slots — empty in v1; reserved for future use.
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # License-backend slot (Phase 8); empty in v1.
          KEYGEN_API_KEY: ${{ secrets.KEYGEN_API_KEY }}
        run: pnpm --filter @awapi/desktop exec electron-builder --config ../../electron-builder.yml --publish always
