<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="AwapiCompare">
  <title>AwapiCompare</title>
  <defs>
    <!-- Background squircle gradient (brand blue) -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#5BA8FF"/>
      <stop offset="55%" stop-color="#3F86E8"/>
      <stop offset="100%" stop-color="#1F5BB8"/>
    </linearGradient>

    <!-- Subtle top sheen -->
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0.00"/>
    </linearGradient>

    <!-- Page paper gradient -->
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#E6ECF3"/>
    </linearGradient>

    <!-- Soft drop shadow for the pages -->
    <filter id="pageShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="10" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Rounded square mask (Apple-style squircle approximation) -->
    <clipPath id="squircle">
      <path d="M512,32
               C 760,32 832,32 920,120
               C 992,208 992,264 992,512
               C 992,760 992,816 920,904
               C 832,992 760,992 512,992
               C 264,992 208,992 120,920
               C 32,832 32,760 32,512
               C 32,264 32,208 104,120
               C 192,32 264,32 512,32 Z"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <g clip-path="url(#squircle)">
    <rect width="1024" height="1024" fill="url(#bg)"/>
    <rect width="1024" height="520" fill="url(#sheen)"/>
  </g>

  <!-- Two pages side-by-side -->
  <g filter="url(#pageShadow)">
    <!-- Left page -->
    <rect x="170" y="216" width="300" height="592" rx="28" ry="28" fill="url(#paper)"/>
    <!-- Right page -->
    <rect x="554" y="216" width="300" height="592" rx="28" ry="28" fill="url(#paper)"/>
  </g>

  <!-- Left page text lines -->
  <g fill="#9AA6B2">
    <rect x="206" y="276" width="228" height="22" rx="11"/>
    <rect x="206" y="324" width="180" height="22" rx="11"/>
    <rect x="206" y="372" width="210" height="22" rx="11"/>
    <rect x="206" y="420" width="150" height="22" rx="11"/>
    <rect x="206" y="468" width="228" height="22" rx="11"/>
    <rect x="206" y="564" width="195" height="22" rx="11"/>
    <rect x="206" y="612" width="228" height="22" rx="11"/>
    <rect x="206" y="660" width="170" height="22" rx="11"/>
    <rect x="206" y="708" width="210" height="22" rx="11"/>
  </g>
  <!-- Left page: removed line highlight -->
  <rect x="190" y="510" width="260" height="34" rx="10" fill="#E74C3C" fill-opacity="0.22"/>
  <rect x="206" y="516" width="220" height="22" rx="11" fill="#E74C3C"/>

  <!-- Right page text lines -->
  <g fill="#9AA6B2">
    <rect x="590" y="276" width="228" height="22" rx="11"/>
    <rect x="590" y="324" width="180" height="22" rx="11"/>
    <rect x="590" y="372" width="210" height="22" rx="11"/>
    <rect x="590" y="420" width="150" height="22" rx="11"/>
    <rect x="590" y="468" width="228" height="22" rx="11"/>
    <rect x="590" y="564" width="195" height="22" rx="11"/>
    <rect x="590" y="612" width="228" height="22" rx="11"/>
    <rect x="590" y="660" width="170" height="22" rx="11"/>
    <rect x="590" y="708" width="210" height="22" rx="11"/>
  </g>
  <!-- Right page: added line highlight -->
  <rect x="574" y="510" width="260" height="34" rx="10" fill="#27AE60" fill-opacity="0.22"/>
  <rect x="590" y="516" width="220" height="22" rx="11" fill="#27AE60"/>

  <!-- Center compare badge -->
  <g>
    <circle cx="512" cy="512" r="86" fill="#1F2A37"/>
    <circle cx="512" cy="512" r="86" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2"/>
    <!-- Less-than / greater-than chevrons forming a compare glyph -->
    <path d="M492 470 L452 512 L492 554"
          fill="none" stroke="#ffffff" stroke-width="16"
          stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M532 470 L572 512 L532 554"
          fill="none" stroke="#ffffff" stroke-width="16"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Outer hairline for crispness on light backgrounds -->
  <path d="M512,32
           C 760,32 832,32 920,120
           C 992,208 992,264 992,512
           C 992,760 992,816 920,904
           C 832,992 760,992 512,992
           C 264,992 208,992 120,920
           C 32,832 32,760 32,512
           C 32,264 32,208 104,120
           C 192,32 264,32 512,32 Z"
        fill="none" stroke="#000000" stroke-opacity="0.08" stroke-width="2"/>
</svg>
